spring:
  application:
    name: gitlab-release-track
  datasource:
    url: jdbc:h2:file:./data/releaseapp;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  main:
    web-application-type: none

gitlab:
  base-url: ${GITLAB_BASE_URL}
  token: ${GITLAB_TOKEN}
